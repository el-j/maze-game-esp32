name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  firmware:
    name: Firmware – PlatformIO Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/firmware

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('packages/firmware/platformio.ini') }}
          restore-keys: pio-

      - name: Install PlatformIO Core
        run: pip install --quiet platformio

      - name: Compile firmware
        run: pio run
