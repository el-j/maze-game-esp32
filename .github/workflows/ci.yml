name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ── 1. C++ Firmware compile (ESP32) ─────────────────────────────────────────
  firmware-cpp:
    name: Firmware C++ – PlatformIO Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/firmware

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('packages/firmware/platformio.ini') }}
          restore-keys: pio-

      - name: Install PlatformIO Core
        run: pip install --quiet platformio

      - name: Compile firmware (release)
        run: pio run -e esp32dev

      - name: Compile firmware (debug)
        run: pio run -e esp32dev-debug

      - name: Extract C++ binary sizes
        run: |
          ELF=".pio/build/esp32dev/firmware.elf"
          SIZE_BIN=$(find ~/.platformio -name "xtensa-esp32-elf-size" 2>/dev/null | head -1)
          if [ -z "$SIZE_BIN" ]; then SIZE_BIN="size"; fi
          if [ -f "$ELF" ]; then
            "$SIZE_BIN" -A "$ELF" | tee cpp-size.txt
          else
            echo "ELF not found" > cpp-size.txt
          fi

      - name: Upload C++ size artefacts
        uses: actions/upload-artifact@v4
        with:
          name: cpp-esp32-artefacts
          # Path is workspace-root relative; the run step's CWD is packages/firmware,
          # so cpp-size.txt is written to packages/firmware/cpp-size.txt.
          path: packages/firmware/cpp-size.txt
          if-no-files-found: warn

  # ── 2. C++ Native unit tests (host) ─────────────────────────────────────────
  firmware-cpp-tests:
    name: Firmware C++ – Native Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/firmware

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('packages/firmware/platformio.ini') }}
          restore-keys: pio-

      - name: Install PlatformIO Core
        run: pip install --quiet platformio

      - name: Run native unit tests
        run: pio test -e native

  # ── 3. Rust firmware – host unit tests ──────────────────────────────────────
  firmware-rust-tests:
    name: Firmware Rust – Host Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/firmware-rust

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/firmware-rust/target
          key: rust-stable-${{ hashFiles('packages/firmware-rust/Cargo.lock') }}
          restore-keys: rust-stable-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (lib only – host target)
        run: cargo clippy --lib -- -D warnings

      - name: Run all lib tests
        run: cargo test --lib

  # ── 4. Rust firmware – ESP32 cross-compile (PRs + main branch) ─────────────
  firmware-rust-esp32:
    name: Firmware Rust – ESP32 Cross-Compile
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    defaults:
      run:
        working-directory: packages/firmware-rust

    steps:
      - uses: actions/checkout@v4

      - name: Install espup
        run: cargo install espup --locked

      - name: Install Espressif Rust toolchain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: espup install --export-file /tmp/espup-env.sh

      - name: Cache Espressif toolchain artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/esp
            ~/.cargo/registry
            ~/.cargo/git
            packages/firmware-rust/target
          key: rust-esp-${{ hashFiles('packages/firmware-rust/Cargo.lock') }}
          restore-keys: rust-esp-

      - name: Add rust-src component (needed for -Zbuild-std)
        run: |
          source /tmp/espup-env.sh
          rustup component add rust-src

      - name: Cross-compile for ESP32
        run: |
          source /tmp/espup-env.sh
          cargo +esp build --release \
            --features esp32-target \
            --target xtensa-esp32-none-elf \
            -Zbuild-std=core

      - name: Extract Rust binary sizes
        run: |
          source /tmp/espup-env.sh
          SIZE_BIN=$(find ~/.rustup/toolchains/esp -name "xtensa-esp32-elf-size" 2>/dev/null | head -1)
          ELF="target/xtensa-esp32-none-elf/release/maze-game-esp32-rust"
          mkdir -p rust-artefacts
          if [ -n "$SIZE_BIN" ] && [ -f "$ELF" ]; then
            "$SIZE_BIN" -A "$ELF" | tee rust-artefacts/rust-size.txt
          else
            echo "size tool or ELF not found" | tee rust-artefacts/rust-size.txt
          fi

      - name: Upload Rust artefacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-esp32-artefacts
          path: |
            packages/firmware-rust/target/xtensa-esp32-none-elf/release/maze-game-esp32-rust
            packages/firmware-rust/rust-artefacts/rust-size.txt
          if-no-files-found: warn

  # ── 5. Webapp tests ──────────────────────────────────────────────────────────
  webapp:
    name: Webapp – TypeScript Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type-check
        run: npx tsc --noEmit

  # ── 6. Binary size comparison (main only) ────────────────────────────────────
  size-comparison:
    name: Binary Size Comparison
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [firmware-cpp, firmware-rust-esp32]

    steps:
      - uses: actions/checkout@v4

      - name: Download Rust artefacts
        uses: actions/download-artifact@v4
        with:
          name: rust-esp32-artefacts
          path: /tmp/rust-artefacts
        continue-on-error: true

      - name: Download C++ artefacts
        uses: actions/download-artifact@v4
        with:
          name: cpp-esp32-artefacts
          path: /tmp/cpp-artefacts
        continue-on-error: true

      - name: Generate comparison.json
        run: |
          python3 - <<'EOF'
          import json, os, re, datetime

          def parse_size_txt(path):
              out = {"flash_bytes": 0, "ram_bytes": 0, "bss_bytes": 0, "data_bytes": 0}
              if not os.path.exists(path):
                  return {k: None for k in out}
              with open(path) as f:
                  for line in f:
                      if ".text" in line or ".rodata" in line:
                          m = re.search(r'\b(\d+)\b', line)
                          if m: out["flash_bytes"] += int(m.group(1))
                      elif ".bss" in line:
                          m = re.search(r'\b(\d+)\b', line)
                          if m:
                              v = int(m.group(1))
                              out["bss_bytes"] += v
                              out["ram_bytes"] += v
                      elif ".data" in line:
                          m = re.search(r'\b(\d+)\b', line)
                          if m:
                              v = int(m.group(1))
                              out["data_bytes"] += v
                              out["ram_bytes"] += v
              return {k: (v or None) for k, v in out.items()}

          rust = parse_size_txt("/tmp/rust-artefacts/rust-artefacts/rust-size.txt")
          cpp  = parse_size_txt("/tmp/cpp-artefacts/cpp-size.txt")

          result = {
              "generated_at": datetime.datetime.utcnow().isoformat() + "Z",
              "generated_by": "ci",
              "c_firmware": {
                  "framework": "Arduino / PlatformIO",
                  "language": "C++17",
                  "toolchain": "xtensa-esp32-elf-gcc",
                  "opt_level": "-Os",
                  **cpp,
                  "build_time_s": None,
              },
              "rust_firmware": {
                  "framework": "esp-hal (bare-metal)",
                  "language": "Rust 2021 edition",
                  "toolchain": "esp (espressif fork)",
                  "opt_level": "s + LTO + strip",
                  **rust,
                  "build_time_s": None,
              },
              "notes": [
                  "flash_bytes = sum of .text + .rodata sections (code + constants)",
                  "ram_bytes   = sum of .data + .bss sections (initialised + zero-init RAM)",
                  "Measured from Release ELF targeting xtensa-esp32-none-elf.",
                  "null = section not found in size output.",
              ],
          }
          os.makedirs("webapp/public", exist_ok=True)
          with open("webapp/public/comparison.json", "w") as f:
              json.dump(result, f, indent=2)
          print(json.dumps(result, indent=2))
          EOF

      - name: Upload comparison.json artefact
        uses: actions/upload-artifact@v4
        with:
          name: comparison-json
          path: webapp/public/comparison.json

  # ── 7. GitHub Release (main push only) ───────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [firmware-cpp, firmware-rust-esp32, firmware-cpp-tests, firmware-rust-tests, webapp]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Rust ESP32 artefacts
        uses: actions/download-artifact@v4
        with:
          name: rust-esp32-artefacts
          path: /tmp/release-artefacts
        continue-on-error: true

      - name: Create release tag
        id: tag
        run: |
          TAG="release-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          body: |
            Automated release from commit ${{ github.sha }}.

            ### Artefacts
            - `maze-game-esp32-rust` – Rust firmware ELF for ESP32 (xtensa-esp32-none-elf, release build)
          files: |
            /tmp/release-artefacts/packages/firmware-rust/target/xtensa-esp32-none-elf/release/maze-game-esp32-rust
          fail_on_unmatched_files: false
