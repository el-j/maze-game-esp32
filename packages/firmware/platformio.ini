; ================================================================
;  platformio.ini  –  PlatformIO Build Configuration
; ================================================================
;  Board:     ESP32 DevKit V1 (38-pin variant)
;  Framework: Arduino (ESP32 Arduino 3.x)
;
;  ── Environments ────────────────────────────────────────────
;  esp32dev          Normal game build  (make build / make upload)
;  esp32dev-debug    Debug dashboard    (make debug-build / make debug-upload)
;
;  The debug environment starts a WiFi Access Point "MazeDev"
;  (no password) and serves a live dashboard at http://192.168.4.1
;
;  Or use the root Makefile shortcuts:
;    make build / make upload / make monitor / make clean
;    make debug-build / make debug-upload
; ================================================================

; ── Shared base settings ────────────────────────────────────
[base]
; Pinned to ^6.0.0 to guarantee Arduino ESP32 3.x is used.
; This version introduced the timerBegin(freq), timerAlarm(),
; and ledcAttach() APIs that this firmware uses.
; Do NOT downgrade below 6.0.0 – the old API will not compile.
platform  = espressif32@^6.0.0
board     = esp32dev
framework = arduino

; Serial monitor baud rate (must match Serial.begin() in main.cpp)
monitor_speed = 115200

; Adafruit MPU6050 driver + its required Unified Sensor base.
lib_deps =
    adafruit/Adafruit MPU6050 @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.9

; ── Normal game build ────────────────────────────────────────
[env:esp32dev]
extends = base

; ── Debug dashboard build ────────────────────────────────────
; Adds -DDEBUG_MODE which activates:
;   • WiFi Access Point  SSID: "MazeDev"  Password: (none)
;   • HTTP server on port 80
;   • Live dashboard at http://192.168.4.1
;   • /api/state JSON endpoint polled by the dashboard every 250 ms
; WebServer and WiFi are part of the ESP32 Arduino core – no extra libs.
[env:esp32dev-debug]
extends     = base
build_flags = -DDEBUG_MODE

; ── Native host tests ────────────────────────────────────────
; Runs on the host machine (Linux/macOS/Windows) – no hardware needed.
; Uses the Unity test framework bundled with PlatformIO.
; Tests live in packages/firmware/test/ subdirectories.
; Run:  make test   OR   cd packages/firmware && pio test -e native
[env:native]
platform         = native
build_src_filter = -<*>  ; exclude Arduino src files; tests are self-contained
